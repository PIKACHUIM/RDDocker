name: Build App EasyDesk

on:
  push:
    paths:
      - 'easydesk/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: easydesk/go.sum

      - name: Tidy dependencies
        working-directory: easydesk
        run: go mod tidy

      - name: Build
        working-directory: easydesk
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o ../dist/easydesk-${{ matrix.goos }}-${{ matrix.goarch }} .

      - uses: actions/upload-artifact@v4
        with:
          name: easydesk-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: easydesk-*
          merge-multiple: true
          path: dist/

      - name: Publish Beta Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.0-beta
          name: Beta Build
          prerelease: true
          files: dist/easydesk-*
