name: Build Debian Images

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      desktop:
        description: 'Desktop to build (all/server/x11gui/gnome3/xfce4l/plasma/gxdeos/nirios)'
        default: 'all'

env:
  IMAGE_PREFIX: pikachuim/debian

jobs:
  build-server:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [bookworm, trixie]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
      - id: vars
        run: |
          if [ "${{ matrix.version }}" = "bookworm" ]; then echo "vershow=12" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.version }}" = "trixie" ]; then echo "vershow=13" >> $GITHUB_OUTPUT
          else echo "vershow=${{ matrix.version }}" >> $GITHUB_OUTPUT; fi
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockers/Debian/Desktops/Server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ steps.vars.outputs.vershow }}-server
            ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-server
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=debian
            OS_VERSHOW=${{ steps.vars.outputs.vershow }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-x11gui:
    needs: build-server
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [bookworm, trixie]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
      - id: vars
        run: |
          if [ "${{ matrix.version }}" = "bookworm" ]; then echo "vershow=12" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.version }}" = "trixie" ]; then echo "vershow=13" >> $GITHUB_OUTPUT
          else echo "vershow=${{ matrix.version }}" >> $GITHUB_OUTPUT; fi
      - uses: docker/build-push-action@v5
        if: ${{ inputs.desktop == 'all' || inputs.desktop == '' || inputs.desktop == 'x11gui' || github.event_name != 'workflow_dispatch' }}
        with:
          context: .
          file: Dockers/Debian/Desktops/X11GUI
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ steps.vars.outputs.vershow }}-x11gui
            ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-x11gui
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=debian
            OS_VERSHOW=${{ steps.vars.outputs.vershow }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-desktops:
    needs: build-x11gui
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [bookworm, trixie]
        desktop: [gnome3, xfce4l, plasma, gxdeos, nirios]
        exclude:
          - desktop: gxdeos
            version: trixie
          - desktop: nirios
            version: trixie
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
      - id: vars
        run: |
          if [ "${{ matrix.version }}" = "bookworm" ]; then echo "vershow=12" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.version }}" = "trixie" ]; then echo "vershow=13" >> $GITHUB_OUTPUT
          else echo "vershow=${{ matrix.version }}" >> $GITHUB_OUTPUT; fi
          case "${{ matrix.desktop }}" in
            gnome3) echo "dockerfile=GNOME3" >> $GITHUB_OUTPUT ;;
            xfce4l) echo "dockerfile=Xfce4L" >> $GITHUB_OUTPUT ;;
            plasma) echo "dockerfile=Plasma"  >> $GITHUB_OUTPUT ;;
            gxdeos) echo "dockerfile=GXDeOS"  >> $GITHUB_OUTPUT ;;
            nirios) echo "dockerfile=Nirios"  >> $GITHUB_OUTPUT ;;
          esac
          case "${{ matrix.desktop }}" in
            gxdeos|nirios) echo "platforms=linux/amd64" >> $GITHUB_OUTPUT ;;
            *)             echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT ;;
          esac
      - uses: docker/build-push-action@v5
        if: ${{ inputs.desktop == 'all' || inputs.desktop == '' || inputs.desktop == matrix.desktop || github.event_name != 'workflow_dispatch' }}
        with:
          context: .
          file: Dockers/Debian/Desktops/${{ steps.vars.outputs.dockerfile }}
          platforms: ${{ steps.vars.outputs.platforms }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ steps.vars.outputs.vershow }}-${{ matrix.desktop }}
            ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-${{ matrix.desktop }}
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=debian
            OS_VERSHOW=${{ steps.vars.outputs.vershow }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
