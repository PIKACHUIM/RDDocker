name: Build Changed Docker Images

on:
  push:
    branches: [master]
    paths:
      - 'Dockers/**'
      - 'Scripts/**'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ubuntu: ${{ steps.filter.outputs.ubuntu }}
      debian: ${{ steps.filter.outputs.debian }}
      fedora: ${{ steps.filter.outputs.fedora }}
      alpine: ${{ steps.filter.outputs.alpine }}
      archos: ${{ steps.filter.outputs.archos }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ubuntu:
              - 'Dockers/Ubuntu/**'
              - 'Scripts/**'
            debian:
              - 'Dockers/Debian/**'
              - 'Scripts/**'
            fedora:
              - 'Dockers/Fedora/**'
              - 'Scripts/**'
            alpine:
              - 'Dockers/Alpine/**'
              - 'Scripts/**'
            archos:
              - 'Dockers/ArchOS/**'
              - 'Scripts/**'

  build-ubuntu:
    needs: changes
    if: needs.changes.outputs.ubuntu == 'true'
    uses: ./.github/workflows/build-ubuntu.yml
    secrets: inherit

  build-debian:
    needs: changes
    if: needs.changes.outputs.debian == 'true'
    uses: ./.github/workflows/build-debian.yml
    secrets: inherit

  build-fedora:
    needs: changes
    if: needs.changes.outputs.fedora == 'true'
    uses: ./.github/workflows/build-fedora.yml
    secrets: inherit

  build-alpine:
    needs: changes
    if: needs.changes.outputs.alpine == 'true'
    uses: ./.github/workflows/build-alpine.yml
    secrets: inherit

  build-archos:
    needs: changes
    if: needs.changes.outputs.archos == 'true'
    uses: ./.github/workflows/build-archos.yml
    secrets: inherit
