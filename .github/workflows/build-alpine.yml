name: Build Alpine Images

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      desktop:
        description: 'desktop to build (all/server/x11gui/gnome3/xfce4l/plasma)'
        default: 'all'

env:
  IMAGE_PREFIX: pikachuim/alpine

jobs:
  build-server:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['3.23.4', '3.24.1']
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: dockers/alpine/desktops/server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-server
            ghcr.io/${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-server
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=alpine
            OS_VERSHOW=${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-x11gui:
    needs: build-server
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['3.23.4', '3.24.1']
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        if: ${{ inputs.desktop == 'all' || inputs.desktop == '' || inputs.desktop == 'x11gui' || github.event_name != 'workflow_dispatch' }}
        with:
          context: .
          file: dockers/alpine/desktops/x11gui
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-x11gui
            ghcr.io/${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-x11gui
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=alpine
            OS_VERSHOW=${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-desktops:
    needs: build-x11gui
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['3.23.4', '3.24.1']
        desktop: [gnome3, xfce4l, plasma, hyland]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      - id: vars
        run: |
          case "${{ matrix.desktop }}" in
            gnome3) echo "dockerfile=gnome3" >> $GITHUB_OUTPUT ;;
            xfce4l) echo "dockerfile=xfce4l" >> $GITHUB_OUTPUT ;;
            plasma) echo "dockerfile=plasma" >> $GITHUB_OUTPUT ;;
          esac
      - uses: docker/build-push-action@v5
        if: ${{ inputs.desktop == 'all' || inputs.desktop == '' || inputs.desktop == matrix.desktop || github.event_name != 'workflow_dispatch' }}
        with:
          context: .
          file: dockers/alpine/desktops/${{ steps.vars.outputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-${{ matrix.desktop }}
            ghcr.io/${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-${{ matrix.desktop }}
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=alpine
            OS_VERSHOW=${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,m          cache-to: type=gha,mode=max
