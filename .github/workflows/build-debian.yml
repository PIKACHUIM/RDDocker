name: Build Debian Images

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      desktop:
        description: 'Desktop to build (all/server/x11gui/gnome3/xfce4l/plasma/gxdeos/nirios)'
        default: 'all'

env:
  IMAGE_PREFIX: pikachuim/debian

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [bookworm, trixie]
        desktop: [server, x11gui, gnome3, xfce4l, plasma, gxdeos, nirios]
        arch: [linux/amd64, linux/arm64]
        exclude:
          - desktop: gxdeos
            arch: linux/arm64
          - desktop: nirios
            arch: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set variables
        id: vars
        run: |
          if [ "${{ matrix.version }}" = "bookworm" ]; then
            echo "vershow=12" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.version }}" = "trixie" ]; then
            echo "vershow=13" >> $GITHUB_OUTPUT
          else
            echo "vershow=${{ matrix.version }}" >> $GITHUB_OUTPUT
          fi
          ARCH_SUFFIX=$(echo "${{ matrix.arch }}" | sed 's|linux/||;s|amd64||;s|arm64|-arm64|')
          echo "arch_suffix=${ARCH_SUFFIX}" >> $GITHUB_OUTPUT
          case "${{ matrix.desktop }}" in
            server) echo "dockerfile=Server" >> $GITHUB_OUTPUT ;;
            x11gui) echo "dockerfile=X11GUI" >> $GITHUB_OUTPUT ;;
            gnome3) echo "dockerfile=GNOME3" >> $GITHUB_OUTPUT ;;
            xfce4l) echo "dockerfile=Xfce4L" >> $GITHUB_OUTPUT ;;
            plasma) echo "dockerfile=Plasma" >> $GITHUB_OUTPUT ;;
            gxdeos) echo "dockerfile=GXDeOS" >> $GITHUB_OUTPUT ;;
            nirios) echo "dockerfile=Nirios" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and push
        if: ${{ inputs.desktop == 'all' || inputs.desktop == '' || inputs.desktop == matrix.desktop || github.event_name != 'workflow_dispatch' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockers/Debian/Desktops/${{ steps.vars.outputs.dockerfile }}
          platforms: ${{ matrix.arch }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ steps.vars.outputs.vershow }}-${{ matrix.desktop }}${{ steps.vars.outputs.arch_suffix }}
            ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-${{ matrix.desktop }}${{ steps.vars.outputs.arch_suffix }}
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=debian
            OS_VERSHOW=${{ steps.vars.outputs.vershow }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
