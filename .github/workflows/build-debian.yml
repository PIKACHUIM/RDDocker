name: Build Debian Images

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      desktop:
        description: 'desktop to build (all/server/x11gui/gnome3/xfce4l/plasma/deepin/nirios/hyland)'
        default: 'all'

env:
  IMAGE_PREFIX: pikachuim/debian

jobs:
  build-server:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [bookworm, trixie]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      - id: vers
        run: |
          case "${{ matrix.version }}" in
            bookworm) echo "vershow=12" >> $GITHUB_OUTPUT ;;
            trixie) echo "vershow=13" >> $GITHUB_OUTPUT ;;
            *) echo "vershow=${{ matrix.version }}" >> $GITHUB_OUTPUT ;;
          esac
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: dockers/debian/desktops/server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ steps.vers.outputs.vershow }}-server
            ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-server
            ghcr.io/${{ env.IMAGE_PREFIX }}:${{ steps.vers.outputs.vershow }}-server
            ghcr.io/${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-server
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=debian
            OS_VERSHOW=${{ steps.vers.outputs.vershow }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-x11gui:
    needs: build-server
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [bookworm, trixie]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      - id: vers
        run: |
          case "${{ matrix.version }}" in
            bookworm) echo "vershow=12" >> $GITHUB_OUTPUT ;;
            trixie) echo "vershow=13" >> $GITHUB_OUTPUT ;;
            *) echo "vershow=${{ matrix.version }}" >> $GITHUB_OUTPUT ;;
          esac
      - uses: docker/build-push-action@v5
        if: ${{ inputs.desktop == 'all' || inputs.desktop == '' || inputs.desktop == 'x11gui' || github.event_name != 'workflow_dispatch' }}
        with:
          context: .
          file: dockers/debian/desktops/x11gui
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ steps.vers.outputs.vershow }}-x11gui
            ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-x11gui
            ghcr.io/${{ env.IMAGE_PREFIX }}:${{ steps.vers.outputs.vershow }}-x11gui
            ghcr.io/${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-x11gui
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=debian
            OS_VERSHOW=${{ steps.vers.outputs.vershow }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-desktops:
    needs: build-x11gui
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [bookworm, trixie]
        desktop: [gnome3, xfce4l, plasma, deepin, nirios, hyland]
        exclude:
          - desktop: nirios
            version: trixie
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      - id: vars
        run: |
          case "${{ matrix.version }}" in
            bookworm) echo "vershow=12" >> $GITHUB_OUTPUT ;;
            trixie) echo "vershow=13" >> $GITHUB_OUTPUT ;;
            *) echo "vershow=${{ matrix.version }}" >> $GITHUB_OUTPUT ;;
          esac
          case "${{ matrix.desktop }}" in
            gnome3) echo "dockerfile=gnome3" >> $GITHUB_OUTPUT ;;
            xfce4l) echo "dockerfile=xfce4l" >> $GITHUB_OUTPUT ;;
            plasma) echo "dockerfile=plasma" >> $GITHUB_OUTPUT ;;
            deepin) echo "dockerfile=deepin" >> $GITHUB_OUTPUT ;;
            nirios) echo "dockerfile=nirios" >> $GITHUB_OUTPUT ;;
            hyland) echo "dockerfile=hyland" >> $GITHUB_OUTPUT ;;
          esac
          case "${{ matrix.desktop }}" in
            nirios) echo "platforms=linux/amd64" >> $GITHUB_OUTPUT ;;
            *) echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT ;;
          esac
      - uses: docker/build-push-action@v5
        if: ${{ inputs.desktop == 'all' || inputs.desktop == '' || inputs.desktop == matrix.desktop || github.event_name != 'workflow_dispatch' }}
        with:
          context: .
          file: dockers/debian/desktops/${{ steps.vars.outputs.dockerfile }}
          platforms: ${{ steps.vars.outputs.platforms }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ steps.vars.outputs.vershow }}-${{ matrix.desktop }}
            ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-${{ matrix.desktop }}
            ghcr.io/${{ env.IMAGE_PREFIX }}:${{ steps.vars.outputs.vershow }}-${{ matrix.desktop }}
            ghcr.io/${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-${{ matrix.desktop }}
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=debian
            OS_VERSHOW=${{ steps.vars.outputs.vershow }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
