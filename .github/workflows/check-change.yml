name: Build Changed Images

on:
  push:
    branches: [master]
    paths:
      - 'dockers/**'
      - 'scripts/**'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ubuntu: ${{ steps.filter.outputs.ubuntu }}
      debian: ${{ steps.filter.outputs.debian }}
      fedora: ${{ steps.filter.outputs.fedora }}
      alpine: ${{ steps.filter.outputs.alpine }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ubuntu:
              - 'dockers/ubuntu/**'
              - 'scripts/**'
            debian:
              - 'dockers/debian/**'
              - 'scripts/**'
            fedora:
              - 'dockers/fedora/**'
              - 'scripts/**'
            alpine:
              - 'dockers/alpine/**'
              - 'scripts/**'

  build-ubuntu:
    needs: changes
    if: needs.changes.outputs.ubuntu == 'true'
    uses: ./.github/workflows/build-ubuntu.yml
    secrets: inherit

  build-debian:
    needs: changes
    if: needs.changes.outputs.debian == 'true'
    uses: ./.github/workflows/build-debian.yml
    secrets: inherit

  build-fedora:
    needs: changes
    if: needs.changes.outputs.fedora == 'true'
    uses: ./.github/workflows/build-fedora.yml
    secrets: inherit

  build-alpine:
    needs: changes
    if: needs.changes.outputs.alpine == 'true'
    uses: ./.github/workflows/build-alpine.yml
    secrets: inherit
