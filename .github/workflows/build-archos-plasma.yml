name: Build ArchOS - plasma

on:
  workflow_call:
  workflow_dispatch:

env:
  IMAGE_PREFIX: pikachuim/archos

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockers/ArchOS/Desktops/Plasma
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:'latest'-plasma
            ghcr.io/${{ env.IMAGE_PREFIX }}:'latest'-plasma
          build-args: |
            OS_VERSION='latest'
            OS_SYSTEMS=archos
            OS_VERSHOW='latest'
          cache-from: type=gha
          cache-to: type=gha,mode=max
