name: Docker Login with Retry
inputs:
  username:
    required: true
  password:
    required: true
  ghcr_token:
    required: false
runs:
  using: composite
  steps:
    - name: Login to Docker Hub
      shell: bash
      run: |
        for i in 1 2 3; do
          echo "${{ inputs.password }}" | docker login -u "${{ inputs.username }}" --password-stdin && break
          [ $i -lt 3 ] && echo "Retry $i/3, waiting 20s..." && sleep 20
        done
    - name: Login to GitHub Container Registry
      if: ${{ inputs.ghcr_token != '' }}
      shell: bash
      run: echo "${{ inputs.ghcr_token }}" | docker login ghcr.io -u "${{ inputs.username }}" --password-stdin
