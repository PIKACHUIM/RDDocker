name: Build Ubuntu Images

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      desktop:
        description: 'Desktop to build (all/server/x11gui/gnome3/xfce4l/plasma/gxdeos/nirios)'
        default: 'all'

env:
  IMAGE_PREFIX: pikachuim/ubuntu

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['22.04', '24.04']
        desktop: [server, x11gui, gnome3, xfce4l, plasma, gxdeos, nirios]
        arch: [linux/amd64, linux/arm64]
        exclude:
          - desktop: gxdeos
            arch: linux/arm64
          - desktop: nirios
            arch: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}

      - name: Set variables
        id: vars
        run: |
          ARCH_SUFFIX=$(echo "${{ matrix.arch }}" | sed 's|linux/||;s|amd64||;s|arm64|-arm64|')
          echo "arch_suffix=${ARCH_SUFFIX}" >> $GITHUB_OUTPUT
          case "${{ matrix.desktop }}" in
            server) echo "dockerfile=Server" >> $GITHUB_OUTPUT ;;
            x11gui) echo "dockerfile=X11GUI" >> $GITHUB_OUTPUT ;;
            gnome3) echo "dockerfile=GNOME3" >> $GITHUB_OUTPUT ;;
            xfce4l) echo "dockerfile=Xfce4L" >> $GITHUB_OUTPUT ;;
            plasma) echo "dockerfile=Plasma" >> $GITHUB_OUTPUT ;;
            gxdeos) echo "dockerfile=GXDeOS" >> $GITHUB_OUTPUT ;;
            nirios) echo "dockerfile=Nirios" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and push
        if: ${{ inputs.desktop == 'all' || inputs.desktop == '' || inputs.desktop == matrix.desktop || github.event_name != 'workflow_dispatch' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockers/Ubuntu/Desktops/${{ steps.vars.outputs.dockerfile }}
          platforms: ${{ matrix.arch }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-${{ matrix.desktop }}${{ steps.vars.outputs.arch_suffix }}
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=ubuntu
            OS_VERSHOW=${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
