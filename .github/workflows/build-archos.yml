name: Build ArchOS Images

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      desktop:
        description: 'Desktop to build (all/server/x11gui/gnome3/xfce4l/plasma/deepin/nirios/hyland)'
        default: 'all'

env:
  IMAGE_PREFIX: pikachuim/archos

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: dockers/archos/desktops/server
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:latest-server
            ghcr.io/${{ env.IMAGE_PREFIX }}:latest-server
          build-args: |
            OS_SYSTEMS=archos
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-x11gui:
    needs: build-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        if: ${{ inputs.desktop == 'all' || inputs.desktop == '' || inputs.desktop == 'x11gui' || github.event_name != 'workflow_dispatch' }}
        with:
          context: .
          file: dockers/archos/desktops/x11gui
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:latest-x11gui
            ghcr.io/${{ env.IMAGE_PREFIX }}:latest-x11gui
          build-args: |
            OS_SYSTEMS=archos
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-desktops:
    needs: build-x11gui
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        desktop: [deepin, nirios, hyland]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        if: ${{ inputs.desktop == 'all' || inputs.desktop == '' || inputs.desktop == matrix.desktop || github.event_name != 'workflow_dispatch' }}
        with:
          context: .
          file: dockers/archos/desktops/${{ matrix.desktop }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:latest-${{ matrix.desktop }}
            ghcr.io/${{ env.IMAGE_PREFIX }}:latest-${{ matrix.desktop }}
          build-args: |
            OS_SYSTEMS=archos
          cache-from: type=gha
          cache-to: type=gha,mode=max
