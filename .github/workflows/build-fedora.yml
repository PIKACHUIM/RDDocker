name: Build Fedora Images

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      desktop:
        description: 'Desktop to build (all/server/x11gui/gnome3/xfce4l/plasma/deepin)'
        default: 'all'

env:
  IMAGE_PREFIX: pikachuim/fedora

jobs:
  build-server:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['41', '42']
        arch: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
      - id: vars
        run: |
          ARCH_SUFFIX=$(echo "${{ matrix.arch }}" | sed 's|linux/||;s|amd64||;s|arm64|-arm64|')
          echo "arch_suffix=${ARCH_SUFFIX}" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockers/Fedora/Desktops/Server
          platforms: ${{ matrix.arch }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-server${{ steps.vars.outputs.arch_suffix }}
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=fedora
            OS_VERSHOW=${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-x11gui:
    needs: build-server
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['41', '42']
        arch: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
      - id: vars
        run: |
          ARCH_SUFFIX=$(echo "${{ matrix.arch }}" | sed 's|linux/||;s|amd64||;s|arm64|-arm64|')
          echo "arch_suffix=${ARCH_SUFFIX}" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v5
        if: ${{ inputs.desktop == 'all' || inputs.desktop == '' || inputs.desktop == 'x11gui' || github.event_name != 'workflow_dispatch' }}
        with:
          context: .
          file: Dockers/Fedora/Desktops/X11GUI
          platforms: ${{ matrix.arch }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-x11gui${{ steps.vars.outputs.arch_suffix }}
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=fedora
            OS_VERSHOW=${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-desktops:
    needs: build-x11gui
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['41', '42']
        desktop: [gnome3, xfce4l, plasma, deepin]
        arch: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
      - id: vars
        run: |
          ARCH_SUFFIX=$(echo "${{ matrix.arch }}" | sed 's|linux/||;s|amd64||;s|arm64|-arm64|')
          echo "arch_suffix=${ARCH_SUFFIX}" >> $GITHUB_OUTPUT
          case "${{ matrix.desktop }}" in
            gnome3) echo "dockerfile=GNOME3" >> $GITHUB_OUTPUT ;;
            xfce4l) echo "dockerfile=Xfce4L" >> $GITHUB_OUTPUT ;;
            plasma) echo "dockerfile=Plasma" >> $GITHUB_OUTPUT ;;
            deepin) echo "dockerfile=Deepin" >> $GITHUB_OUTPUT ;;
          esac
      - uses: docker/build-push-action@v5
        if: ${{ inputs.desktop == 'all' || inputs.desktop == '' || inputs.desktop == matrix.desktop || github.event_name != 'workflow_dispatch' }}
        with:
          context: .
          file: Dockers/Fedora/Desktops/${{ steps.vars.outputs.dockerfile }}
          platforms: ${{ matrix.arch }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-${{ matrix.desktop }}${{ steps.vars.outputs.arch_suffix }}
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=fedora
            OS_VERSHOW=${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
