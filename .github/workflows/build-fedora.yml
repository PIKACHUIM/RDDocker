name: Build Fedora Images

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      desktop:
        description: 'Desktop to build (all/server/x11gui/gnome3/xfce4l/plasma/deepin/lingmo)'
        default: 'all'

env:
  IMAGE_PREFIX: pikachuim/fedora

jobs:
  build-server:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['43', '44']
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockers/Fedora/Desktops/Server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-server
            ghcr.io/${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-server
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=fedora
            OS_VERSHOW=${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-x11gui:
    needs: build-server
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['43', '44']
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        if: ${{ inputs.desktop == 'all' || inputs.desktop == '' || inputs.desktop == 'x11gui' || github.event_name != 'workflow_dispatch' }}
        with:
          context: .
          file: Dockers/Fedora/Desktops/X11GUI
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-x11gui
            ghcr.io/${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-x11gui
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=fedora
            OS_VERSHOW=${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-desktops:
    needs: build-x11gui
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['43', '44']
        desktop: [gnome3, xfce4l, plasma, deepin, lingmo]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKER_PUBHUB_USER }}
          password: ${{ secrets.DOCKER_PUBHUB_PASS }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      - id: vars
        run: |
          case "${{ matrix.desktop }}" in
            gnome3) echo "dockerfile=GNOME3" >> $GITHUB_OUTPUT ;;
            xfce4l) echo "dockerfile=Xfce4L" >> $GITHUB_OUTPUT ;;
            plasma) echo "dockerfile=Plasma" >> $GITHUB_OUTPUT ;;
            deepin) echo "dockerfile=Deepin" >> $GITHUB_OUTPUT ;;
            lingmo) echo "dockerfile=Lingmo" >> $GITHUB_OUTPUT ;;
          esac
          case "${{ matrix.desktop }}" in
            lingmo) echo "platforms=linux/amd64" >> $GITHUB_OUTPUT ;;
            *) echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT ;;
          esac
      - uses: docker/build-push-action@v5
        if: ${{ inputs.desktop == 'all' || inputs.desktop == '' || inputs.desktop == matrix.desktop || github.event_name != 'workflow_dispatch' }}
        with:
          context: .
          file: Dockers/Fedora/Desktops/${{ steps.vars.outputs.dockerfile }}
          platforms: ${{ steps.vars.outputs.platforms }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-${{ matrix.desktop }}
            ghcr.io/${{ env.IMAGE_PREFIX }}:${{ matrix.version }}-${{ matrix.desktop }}
          build-args: |
            OS_VERSION=${{ matrix.version }}
            OS_SYSTEMS=fedora
            OS_VERSHOW=${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
