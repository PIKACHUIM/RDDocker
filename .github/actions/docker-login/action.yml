name: Docker Setup with Retry
inputs:
  username:
    required: true
  password:
    required: true
  ghcr_token:
    required: false
    default: ''
runs:
  using: composite
  steps:
    - uses: docker/setup-qemu-action@v3

    - name: Login to GHCR
      if: ${{ inputs.ghcr_token != '' }}
      shell: bash
      run: echo "${{ inputs.ghcr_token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

    - uses: docker/setup-buildx-action@v3
      with:
        driver-opts: image=ghcr.io/moby/buildkit:buildx-stable-1

    - name: Login to Docker Hub
      shell: bash
      run: |
        for i in 1 2 3; do
          echo "${{ inputs.password }}" | docker login -u "${{ inputs.username }}" --password-stdin && break
          [ $i -lt 3 ] && echo "Retry $i/3, waiting 20s..." && sleep 20
        done
